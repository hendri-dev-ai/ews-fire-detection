<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWS Fire Detection - Web Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0b;
            --bg-card: #141417;
            --accent-red: #ff3e3e;
            --accent-orange: #f39c12;
            --accent-green: #00e676;
            --text-main: #e0e0e0;
            --text-muted: #88888b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            background: var(--bg-card);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-red);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 62, 62, 0.3);
        }

        .system-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 8px var(--text-muted);
        }

        .status-dot.active {
            background: var(--accent-green);
            box-shadow: 0 0 12px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- Main Layout --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
            width: 100%;
        }

        @media (max-width: 1200px) {
            main {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
            .side-panel {
                height: auto;
                min-height: 500px;
            }
        }

        /* --- Monitoring Feed --- */
        .feed-container {
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        #virtual-feed {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Changed from cover to prevent cropping */
            border-radius: 12px;
        }

        .feed-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            border-radius: 12px;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 230, 118, 0.2);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
            display: none;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .feed-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            width: 80%;
            z-index: 2;
        }

        .feed-placeholder i {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        /* --- Detection Boxes CSS --- */
        .detection-box {
            position: absolute;
            border: 2px solid;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            display: none;
        }

        .box-fire { border-color: var(--accent-red); color: var(--accent-red); background: rgba(255, 62, 62, 0.1); }
        .box-person { border-color: var(--accent-green); color: var(--accent-green); background: rgba(0, 230, 118, 0.1); }

        /* --- Side Panel --- */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Controls */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.8rem;
        }

        .btn-start {
            background: var(--accent-green);
            color: #000;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); }
        .btn-start:active { transform: translateY(0); }

        .btn-stop {
            background: #333;
            color: #fff;
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-stop.enabled {
            opacity: 1;
            cursor: pointer;
            background: #444;
        }
        .btn-stop.enabled:hover { background: #555; }

        .btn-telegram {
            background: transparent;
            border: 1px solid #0088cc;
            color: #0088cc;
        }

        /* Logs */
        .log-container {
            flex: 1;
            background: #000;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
            color: #33ff33;
            overflow-y: auto;
            position: relative;
            border: 1px solid #1a1a1a;
        }

        .log-entry {
            margin-bottom: 4px;
            animation: fadeIn 0.3s ease-out;
        }
        .log-time { color: #888; font-size: 0.7rem; }
        .log-alert { color: var(--accent-red); font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- Alert Overlay --- */
        .alert-flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 62, 62, 0.15);
            animation: flash 0.5s infinite;
            display: none;
            z-index: 5;
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Footer Credits */
        footer {
            padding: 1rem 2rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            background: var(--bg-card);
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>EWS Fire Detection</h1>
        </div>
        <div class="system-badge">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">SYSTEM STANDBY</span>
        </div>
    </header>

    <main>
        <div class="feed-container">
            <div id="alert-flash" class="alert-flash"></div>
            <div id="scanline" class="scanline"></div>
            
            <canvas id="virtual-feed"></canvas>
            
            <div id="placeholder" class="feed-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-video"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                <p style="margin-top: 1rem;">CAMERA FEED STANDBY</p>
                <p style="font-size: 0.7rem; margin-top: 0.5rem; opacity: 0.6;">Click START MONITORING to begin AI inference</p>
            </div>

            <!-- Detection Mock Boxes -->
            <div id="box-fire" class="detection-box box-fire">!!! FIRE !!! (0.94)</div>
            <div id="box-person" class="detection-box box-person">PERSON (0.88)</div>
        </div>

        <div class="side-panel">
            <div class="card">
                <div class="card-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Control Center
                </div>
                <button id="btn-start" class="btn btn-start">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    START MONITORING
                </button>
                <button id="btn-stop" class="btn btn-stop">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>
                    STOP MONITORING
                </button>
                <button class="btn btn-telegram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    CONNECT TELEGRAM
                </button>
            </div>

            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <div class="card-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><line x1="9" y1="11" x2="15" y2="11"></line></svg>
                    Real-time Logs
                </div>
                <div id="log-container" class="log-container">
                    <div class="log-entry"><span class="log-time">[18:38:01]</span> System ready...</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        EWS Fire Detection System Portfolio Demo | Built with HTML5, CSS3, & JS Simulation
    </footer>

    <script>
        const canvas = document.getElementById('virtual-feed');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const logContainer = document.getElementById('log-container');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const scanline = document.getElementById('scanline');
        const alertFlash = document.getElementById('alert-flash');
        
        const boxFire = document.getElementById('box-fire');
        const boxPerson = document.getElementById('box-person');

        let isRunning = false;
        let animationId;
        let fireDetected = false;

        // Initialize Canvas Size
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function addLog(msg, type = '') {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                         now.getMinutes().toString().padStart(2, '0') + ':' + 
                         now.getSeconds().toString().padStart(2, '0');
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if (type === 'alert') entry.classList.add('log-alert');
            
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logContainer.prepend(entry);
        }

        function drawNoise() {
            if (!isRunning) return;
            ctx.fillStyle = fireDetected ? '#1a0000' : '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Random static noise
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
            }

            // Draw "Video" Simulation (just some moving shapes)
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<10; i+=20) {
                ctx.strokeRect(50, 50, 100, 100);
            }

            animationId = requestAnimationFrame(drawNoise);
        }

        btnStart.onclick = () => {
            isRunning = true;
            placeholder.style.display = 'none';
            btnStart.style.display = 'none';
            btnStop.classList.add('enabled');
            statusDot.classList.add('active');
            statusText.innerText = 'MONITORING ACTIVE';
            scanline.style.display = 'block';
            
            addLog('Connecting to virtual camera feed...');
            setTimeout(() => addLog('Loading YOLOv8n.pt model into browser memory...'), 500);
            setTimeout(() => {
                addLog('AI Inference Engine started.');
                drawNoise();
                startSimulation();
            }, 1200);
        };

        btnStop.onclick = () => {
            if (!isRunning) return;
            isRunning = false;
            cancelAnimationFrame(animationId);
            placeholder.style.display = 'block';
            btnStart.style.display = 'flex';
            btnStop.classList.remove('enabled');
            statusDot.classList.remove('active');
            statusText.innerText = 'SYSTEM STANDBY';
            scanline.style.display = 'none';
            alertFlash.style.display = 'none';
            boxFire.style.display = 'none';
            boxPerson.style.display = 'none';
            
            addLog('Monitoring stopped by user.');
        };

        function startSimulation() {
            if (!isRunning) return;

            // Simulate a person entering the frame
            setTimeout(() => {
                if (!isRunning) return;
                addLog('Object detected: person (0.91)');
                boxPerson.style.display = 'block';
                boxPerson.style.left = '30%';
                boxPerson.style.top = '25%';
                boxPerson.style.width = '150px';
                boxPerson.style.height = '300px';
            }, 3000);

            // Simulate Fire detection
            setTimeout(() => {
                if (!isRunning) return;
                fireDetected = true;
                statusText.innerText = '!!! FIRE DETECTED !!!';
                statusText.style.color = 'var(--accent-red)';
                alertFlash.style.display = 'block';
                
                boxFire.style.display = 'block';
                boxFire.style.left = '45%';
                boxFire.style.top = '40%';
                boxFire.style.width = '100px';
                boxFire.style.height = '80px';
                
                addLog('[ALERT] CRITICAL: FIRE DETECTED!', 'alert');
                addLog('Sending Telegram notification to CHAT_ID: 6181410771...');
                
                // Sound beep simulation (optional, might be annoying in demo)
                // console.log("BEEP!");

                setTimeout(() => {
                    if (!isRunning) return;
                    fireDetected = false;
                    alertFlash.style.display = 'none';
                    boxFire.style.display = 'none';
                    statusText.innerText = 'MONITORING ACTIVE';
                    statusText.style.color = '#fff';
                    addLog('Fire suppressed or moved out of frame.');
                }, 5000);

            }, 7000);

            // Repeat simulation loop
            setTimeout(() => {
                if (isRunning) {
                   boxPerson.style.display = 'none';
                   startSimulation();
                }
            }, 15000);
        }
    </script>
</body>
</html>
